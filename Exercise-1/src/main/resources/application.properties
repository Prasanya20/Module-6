# =====================================================================
# Default profile: runs against an in-memory H2 database so the project
# works immediately after cloning, with no MySQL install required.
#
# To run against real MySQL (as in the hands-on doc) instead, start the
# app with the "mysql" profile, e.g.:
#   mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# and see application-mysql.properties for the connection settings.
# =====================================================================

spring.application.name=orm-learn

# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration (H2 in-memory)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# H2 web console, available at /h2-console while the app is running
spring.h2.console.enabled=true

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Let Hibernate create the schema before data.sql populates it
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
