# =====================================================================
# MySQL profile - matches the hands-on document's configuration.
#
# Before running with this profile:
#   1. Install MySQL Server 8.0
#   2. Create the schema:  mysql -u root -p  ->  create schema ormlearn;
#   3. Create the country table (see src/main/resources/schema-mysql.sql)
#   4. Update the username/password below if they differ from root/root
#
# Run with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# =====================================================================

# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
