spring.application.name=EmployeeManagementSystem

# ------------------------------------------------------------------
# Exercise 1: Primary datasource - H2 in-memory database
# ------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Run data.sql after Hibernate creates the schema (needed since ddl-auto
# builds the tables that data.sql then inserts into).
spring.jpa.defer-datasource-initialization=true

# H2 web console, handy for inspecting data at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------------------------------------------
# Exercise 9: A second, independent H2 datasource ("reporting" DB),
# wired up in config/SecondaryDataSourceConfig.java via a plain
# JdbcTemplate (kept separate from the primary JPA-managed datasource
# above to demonstrate multi-datasource configuration).
# ------------------------------------------------------------------
reporting.datasource.url=jdbc:h2:mem:reportingdb
reporting.datasource.driverClassName=org.h2.Driver
reporting.datasource.username=sa
reporting.datasource.password=password

# ------------------------------------------------------------------
# Exercise 10: Hibernate-specific batch processing configuration.
# order_inserts / order_updates let Hibernate group same-table
# statements together so the batch_size above is actually effective.
# Note: GenerationType.IDENTITY defeats batching in Hibernate, which is
# why entities in this project use GenerationType.SEQUENCE.
# ------------------------------------------------------------------
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
